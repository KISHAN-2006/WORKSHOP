<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Assistant</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(to right, #dfe9f3, #ffffff);
}

/* Header */
.header {
    background: #0d47a1;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* Sub text */
.subtext {
    text-align: center;
    margin-top: 10px;
    color: #555;
    font-size: 18px;
}

/* Chat container */
.chat-container {
    width: 650px;
    margin: 30px auto;
    background: white;
    border-radius: 15px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    overflow: hidden;
}

/* Chat area */
#chatBox {
    height: 420px;
    padding: 20px;
    overflow-y: auto;
    background: #f9fbff;
}

/* Messages */
.message {
    padding: 12px 16px;
    margin: 10px 0;
    border-radius: 15px;
    max-width: 75%;
    font-size: 17px;
}

/* User */
.user {
    background: #1976d2;
    color: white;
    margin-left: auto;
    text-align: right;
}

/* Bot */
.bot {
    background: #e3f2fd;
    color: #000;
    margin-right: auto;
}

/* Input */
.input-area {
    display: flex;
    padding: 15px;
    border-top: 1px solid #ddd;
    background: white;
}

#userInput {
    flex: 1;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* Button */
button {
    margin-left: 10px;
    padding: 14px 20px;
    font-size: 16px;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #0d47a1;
}
</style>
</head>

<body>

<div class="header">🏨 Grand Stay Hotel</div>
<div class="subtext">Your virtual assistant for bookings & services</div>

<div class="chat-container">
    <div id="chatBox">
        <div class="message bot">Welcome to Grand Stay Hotel! How may I assist you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask about rooms, prices, services...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");

    msg.classList.add("message", sender);
    msg.innerText = text;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });

        const data = await response.json();
        addMessage(data.response, "bot");

    } catch {
        addMessage("Sorry, something went wrong.", "bot");
    }
}

document.getElementById("userInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
